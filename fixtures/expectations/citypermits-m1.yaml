    {"type": "KAFKA_DELIVERS", "from_service": "inspections-api", "to_service": "permits-api", "topic": "inspection.completed"},
    {"type": "KAFKA_DELIVERS", "from_service": "inspections-api", "to_service": "permits-api", "topic": "inspection.cancelled"}
  ]
}
